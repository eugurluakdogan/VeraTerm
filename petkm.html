<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petkim (PETKM) — VeraTerm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0c10;--surface:#111418;--surface2:#181c22;--border:#1f2530;--accent:#00d4a8;--accent2:#3b82f6;--warn:#f59e0b;--text:#e8edf5;--text2:#8892a4;--text3:#4a5568;--green:#10b981;--red:#ef4444}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .main{max-width:1400px;margin:0 auto;padding:28px 32px}
  .breadcrumb{display:flex;align-items:center;gap:8px;color:var(--text3);font-size:12px;margin-bottom:20px;font-family:'IBM Plex Mono',monospace}
  .breadcrumb a{color:var(--text2);text-decoration:none}.breadcrumb a:hover{color:var(--accent)}
  .breadcrumb span{color:var(--text2)}
  .coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;text-align:center}
  .cs-icon{font-size:48px;opacity:.5}
  .cs-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--text2)}
  .cs-text{font-size:14px;color:var(--text3);max-width:400px;line-height:1.7}
  .cs-badge{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--warn);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
  footer{border-top:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;color:var(--text3);font-size:12px;font-family:'IBM Plex Mono',monospace;margin-top:32px}
</style>
</head>
<body>
<script src="/nav.js"></script>

<div class="main">
  <div class="breadcrumb">
    <a href="/index.html">Ana Sayfa</a> <span>/</span>
    <span>Petrokimya</span> <span>/</span>
    <span>PETKM</span>
  </div>

  <div class="coming-soon">
    <div class="cs-icon">🧪</div>
    <span class="cs-badge">YAKINDA</span>
    <div class="cs-title">Petkim Sayfası</div>
    <div class="cs-text">
      Petkim için öncü göstergeler, naften ve etilen fiyatları, kapasite kullanım oranları yakında bu sayfada yayınlanacak.
    </div>
  </div>
</div>

<footer>
  <span>VeraTerm © 2026 — BIST Öncü Gösterge Platformu</span>
  <span>Veriler bilgi amaçlıdır, yatırım tavsiyesi değildir.</span>
</footer>

<script src="/nav.js"></script>
</body>
</html>
